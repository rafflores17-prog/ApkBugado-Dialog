<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ApkBugado Dialog</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        background: transparent; /* Remove o rastro cinza quadrado */
        font-family: 'Montserrat', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        /* CORREÇÃO: Padding maior para o botão "FECHAR" não ser cortado pela borda do Android */
        padding: 25px 15px; 
        box-sizing: border-box;
        overflow: hidden;
    }

    .dialog-container {
        background-color: #0f0f1b;
        border: 2px solid #6a00ff;
        border-radius: 20px;
        width: 100%;
        max-width: 320px;
        padding: 20px;
        box-sizing: border-box;
        box-shadow: 0 0 25px rgba(106, 0, 255, 0.4);
        text-align: center;
    }

    .header-banner {
        background: linear-gradient(135deg, #6a00ff, #00d4ff);
        border-radius: 15px;
        padding: 12px;
        color: #fff;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .header-banner h1 {
        margin: 0;
        font-size: 18px;
        text-transform: uppercase;
    }

    .message-box {
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 12px;
        padding: 12px;
        color: #e0e0e0;
        font-size: 12px;
        margin-bottom: 15px;
        line-height: 1.5;
    }

    .button-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .btn {
        font-family: 'Montserrat', sans-serif;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        text-transform: uppercase;
        width: 100%;
        box-sizing: border-box;
        text-decoration: none;
        display: block;
    }

    .btn-telegram { background-color: #00d4ff; color: #000; box-shadow: 0 4px 0 #008eb3; }
    .btn-vip { background-color: #6a00ff; color: #fff; box-shadow: 0 4px 0 #4500a6; }

    /* CORREÇÃO: Estilo do botão fechar para ser visível e funcional */
    .btn-fechar {
        background-color: #1a1a2e;
        color: #ff3b3b; /* Vermelho para destaque */
        border: 1px solid #ff3b3b;
        margin-top: 5px;
        font-size: 11px;
    }
</style>
</head>
<body>

<div class="dialog-container" id="mainBox">
    <div class="header-banner">
        <h1>APKBUGADO</h1>
        <p style="margin:0; font-size:9px; opacity:0.8;">A ELITE DOS MODS</p>
    </div>

    <div class="message-box">
        Visite nosso canal para mods e acessos premium atualizados.
    </div>

    <div class="button-stack">
        <a href="https://t.me/ApkBugado" class="btn btn-telegram">GRUPO TELEGRAM</a>
        <a href="https://painel-vip-nine.vercel.app/" class="btn btn-vip">PAINEL VIP</a>
        
        <button class="btn btn-fechar" onclick="fecharAcao()">FECHAR</button>
    </div>
</div>

<script>
    function fecharAcao() {
        // CORREÇÃO: Substitui o conteúdo por uma mensagem de instrução
        document.body.innerHTML = `
            <div style="color:white; text-align:center; padding:20px; border:1px dashed #444; border-radius:15px;">
                <b style="color:#00d4ff">AVISO FECHADO</b><br>
                <small>Toque em qualquer lugar fora para sair</small>
            </div>
        `;
    }
</script>

</body>
</html>
