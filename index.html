<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ApkBugado</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    background: #000;
    font-family: 'Orbitron', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: linear-gradient(145deg, #0a0a0a, #111);
    border: 2px solid #00ff00;
    border-radius: 20px;
    padding: 30px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 30px #00ff00;
    transition: transform 0.3s, opacity 0.3s;
}

.box:hover {
    transform: scale(1.02);
}

h2 {
    color: #00ff00;
    margin-bottom: 15px;
    font-size: 24px;
}

p {
    color: #00ff00;
    font-size: 15px;
    margin-bottom: 20px;
}

button {
    margin-top: 12px;
    padding: 14px;
    width: 100%;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    opacity: 0.85;
    transform: scale(1.02);
}

.telegram {
    background: #00ff00;
    color: #000;
}

.vip {
    background: #ff0000;
    color: #fff;
}

.fechar {
    background: #000;
    color: #00ff00;
    border: 1px solid #00ff00;
}

@media (max-width: 350px) {
    .box {
        padding: 20px;
    }
    h2 {
        font-size: 20px;
    }
    p {
        font-size: 13px;
    }
    button {
        font-size: 13px;
        padding: 12px;
    }
}
</style>
</head>

<body>

<div class="box" id="dialogBox">
    <h2>ApkBugado</h2>

    <p>
        Nos visite para mais aplicativos MOD e acessos premium atualizados regularmente.
    </p>

    <button class="telegram" onclick="abrirTelegram()">Canal Telegram</button>
    <button class="vip" onclick="abrirVip()">PAINEL VIP</button>
    <button class="fechar" onclick="fechar()">Fechar</button>
</div>

<script>
function abrirTelegram() {
    window.location.href = "https://t.me/ApkBugado";
}

function abrirVip() {
    window.location.href = "https://painel-vip-nine.vercel.app/";
}

function fechar() {
    const box = document.getElementById('dialogBox');
    box.style.opacity = '0';
    setTimeout(() => {
        box.style.display = 'none';
    }, 300);
}
</script>

</body>
</html>
