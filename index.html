<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ApkBugado</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #0a0a0a;
    border: 2px solid #00ff00;
    border-radius: 15px;
    padding: 25px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 0 20px #00ff00;
}

h2 {
    color: #00ff00;
    margin-bottom: 10px;
}

p {
    color: #00ff00;
    font-size: 14px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    font-size: 14px;
}

.telegram {
    background: #00ff00;
    color: black;
}

.vip {
    background: red;
    color: white;
}

.fechar {
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
}
</style>
</head>

<body>

<div class="box">
    <h2>ApkBugado</h2>

    <p>
        Nos visite para mais aplicativos MOD e acessos premium atualizados regularmente.
    </p>

    <button class="telegram" onclick="abrirTelegram()">Canal Telegram</button>
    <button class="vip" onclick="abrirVip()">GRUPO VIP</button>
    <button class="fechar" onclick="fechar()">Fechar</button>
</div>

<script>
function abrirTelegram() {
    window.location.href = "https://t.me/ApkBugado";
}

function abrirVip() {
    window.location.href = "https://painel-vip-nine.vercel.app/";
}

function fechar() {
    document.body.innerHTML = "";
}
</script>

</body>
</html>
